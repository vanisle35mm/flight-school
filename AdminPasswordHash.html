<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flight School Admin Password Hash</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f5f7fb;
        background: #07111d;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(640px, 100%);
        padding: 28px;
        border: 1px solid #27384d;
        border-radius: 12px;
        background: #0d1a29;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0 0 22px;
        color: #aebbd0;
        line-height: 1.5;
      }

      label {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
        color: #d9e4f2;
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #32465f;
        border-radius: 8px;
        color: #f5f7fb;
        background: #081321;
        font: inherit;
      }

      input {
        height: 44px;
        padding: 0 12px;
      }

      textarea {
        min-height: 110px;
        padding: 12px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 13px;
      }

      button {
        min-height: 44px;
        margin-top: 8px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        color: #07111d;
        background: #8fc8eb;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .hint {
        margin-top: 14px;
        color: #f0c66e;
        font-size: 14px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Admin Password Hash</h1>
      <p>Type the admin password you want to use. Copy the hash into Vercel as <strong>VITE_ADMIN_PASSWORD_HASH</strong>. The password itself stays on this computer.</p>

      <label>
        Admin password
        <input id="password" type="password" autocomplete="new-password" />
      </label>

      <label>
        Hash for Vercel
        <textarea id="hash" readonly></textarea>
      </label>

      <button id="copy" type="button">Copy Hash</button>
      <div class="hint" id="hint"></div>
    </main>

    <script>
      const passwordInput = document.querySelector('#password');
      const hashOutput = document.querySelector('#hash');
      const copyButton = document.querySelector('#copy');
      const hint = document.querySelector('#hint');

      const hashPassword = async (password) => {
        const bytes = new TextEncoder().encode(password);
        const digest = await crypto.subtle.digest('SHA-256', bytes);
        return Array.from(new Uint8Array(digest))
          .map((byte) => byte.toString(16).padStart(2, '0'))
          .join('');
      };

      passwordInput.addEventListener('input', async () => {
        hint.textContent = '';
        hashOutput.value = passwordInput.value ? await hashPassword(passwordInput.value) : '';
      });

      copyButton.addEventListener('click', async () => {
        if (!hashOutput.value) {
          hint.textContent = 'Type a password first.';
          return;
        }

        await navigator.clipboard.writeText(hashOutput.value);
        hint.textContent = 'Hash copied. Paste it into Vercel, then redeploy.';
      });
    </script>
  </body>
</html>
